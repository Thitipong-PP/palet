name: go
description: Go programming language commands

commands:
  - name: go run
    description: Run a Go program
    template: "go run {{.file}}"
    args:
      - name: file
        description: Path to the .go file or main package
        type: file
        required: true

  - name: go build
    description: Compile a Go package
    template: "go build {{if .output}}-o {{.output}}{{end}} {{.package}}"
    args:
      - name: package
        description: Package to build (e.g. ./cmd/myapp or .)
        type: string
        required: true
        default: "."
      - name: output
        description: Output binary name (optional)
        type: string
        required: false
        flag: "-o"

  - name: go test
    description: Run tests in a package
    template: "go test {{.flags}} {{.package}}"
    args:
      - name: package
        description: Package path (e.g. ./... for all)
        type: string
        required: true
        default: "./..."
      - name: flags
        description: Extra flags
        type: enum
        required: false
        default: "-v"
        choices: ["-v", "-race", "-v -race", "-short"]

  - name: go get
    description: Add or upgrade a dependency
    template: "go get {{.module}}"
    args:
      - name: module
        description: Module path (e.g. github.com/user/repo@latest)
        type: string
        required: true

  - name: go mod tidy
    description: Remove unused dependencies and add missing ones
    template: "go mod tidy"
    args: []

  - name: go fmt
    description: Format Go source code
    template: "go fmt {{.package}}"
    args:
      - name: package
        description: Package path (default all)
        type: string
        required: false
        default: "./..."
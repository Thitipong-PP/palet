name: git
description: Git version control commands

commands:
  - name: git add
    description: Add stage to commit
    template: 'git add "{{.directory}}"'
    args:
      - name: directory
        description: Directory name
        type: string
        required: true
  - name: git commit
    description: Commit staged changes with a message
    template: 'git commit -m "{{.message}}"'
    args:
      - name: message
        description: Commit message
        type: string
        required: true

  - name: git push
    description: Push commits to a remote branch
    template: "git push {{.remote}} {{.branch}}"
    args:
      - name: remote
        description: Remote name
        type: string
        required: true
        default: "origin"
      - name: branch
        description: Branch name
        type: string
        required: true
        default: "main"

  - name: git checkout
    description: Switch or create a branch
    template: "git checkout {{if .new}}-b {{end}}{{.branch}}"
    args:
      - name: branch
        description: Branch name
        type: string
        required: true
      - name: new
        description: Create new branch?
        type: bool
        required: false
        default: "false"

  - name: git log
    description: Show commit history
    template: "git log {{.flags}}"
    args:
      - name: flags
        description: Display style
        type: enum
        required: false
        default: "--oneline -20"
        choices: ["--oneline -20", "--oneline --graph --all", "-p -5", "--stat -10"]